<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calm Zone 🌿</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1b2a">

<style>
body {
  margin: 0;
  font-family: Tahoma;
  background: linear-gradient(135deg, #0d1b2a, #1b263b);
  color: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  font-size: 20px;
}

.container {
  background: rgba(255,255,255,0.05);
  padding: 35px;
  border-radius: 20px;
  backdrop-filter: blur(12px);
  max-width: 350px;
}

h1 {
  font-size: 38px;
}

#text {
  margin-top: 20px;
  min-height: 40px;
  line-height: 1.8;
}

button {
  margin-top: 20px;
  padding: 14px 25px;
  border: none;
  border-radius: 12px;
  background: #ffffff;
  color: #0d1b2a;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Calm Zone 🌿</h1>
<p>جایی برای آرامش تو 💙</p>

<div id="text"></div>

<button onclick="startApp()">شروع آرامش ✨</button>

</div>

<script>
const messages = [
"آرام باش... دنیا هنوز قشنگه 💙",
"نفس عمیق بکش... همه چیز میگذره 🌿",
"تو قوی‌تر از چیزی هستی که فکر می‌کنی ✨",
"همه چیز درست میشه..."
];

let i = 0;
let j = 0;

/* شروع */
function startApp() {
  document.getElementById("text").innerHTML = "";
  i = 0;
  j = 0;
  type();
}

/* تایپ */
function type() {
  if (i < messages.length) {
    if (j < messages[i].length) {
      document.getElementById("text").innerHTML += messages[i][j];
      j++;
      setTimeout(type, 40);
    } else {
      speak(messages[i]);
      i++;
      j = 0;
      document.getElementById("text").innerHTML += "<br><br>";
      setTimeout(type, 1200);
    }
  }
}

/* 🎤 خواندن متن با انتخاب صدا */
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);

  let voices = window.speechSynthesis.getVoices();

  let faVoice = voices.find(v => v.lang.includes("fa"));

  if (faVoice) {
    speech.voice = faVoice;
  }

  speech.lang = "fa-IR";
  speech.rate = 0.9;
  speech.pitch = 1;

  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(speech);
}

/* لود شدن صداها */
window.speechSynthesis.onvoiceschanged = () => {
  window.speechSynthesis.getVoices();
};

/* Service Worker */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
