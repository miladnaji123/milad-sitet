<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milad Pro Player</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg, #000, #111, #222);
  color: white;
  text-align: center;
}

.container {
  margin-top: 50px;
}

.player {
  width: 300px;
  margin: auto;
  background: #1a1a1a;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px #000;
}

.title {
  font-size: 18px;
  margin-bottom: 10px;
}

.controls button {
  margin: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}

.play { background: #25D366; }
.next { background: #555; }
.prev { background: #555; }

.progress {
  width: 100%;
  height: 5px;
  background: #444;
  margin: 10px 0;
  border-radius: 5px;
  cursor: pointer;
}

.progress-bar {
  height: 5px;
  background: #25D366;
  width: 0%;
  border-radius: 5px;
}

.time {
  font-size: 14px;
}
</style>

</head>

<body>

<div class="container">
  <h2>🎧 موزیک پلیر حرفه‌ای</h2>

  <div class="player">
    <div class="title" id="title">آهنگ 1</div>

    <div class="progress" onclick="setProgress(event)">
      <div class="progress-bar" id="progress"></div>
    </div>

    <div class="time" id="time">0:00</div>

    <div class="controls">
      <button class="prev" onclick="prevSong()">⏮</button>
      <button class="play" onclick="togglePlay()">▶</button>
      <button class="next" onclick="nextSong()">⏭</button>
    </div>
  </div>
</div>

<audio id="audio"></audio>

<script>
let songs = [
  {
    title: "آهنگ 1",
    src: "https://dl.espressif.com/dl/audio/ff-16b-2c-44100hz.mp3"
  },
  {
    title: "آهنگ 2",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
  },
  {
    title: "آهنگ 3",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
  }
];

let current = 0;
let audio = document.getElementById("audio");
let title = document.getElementById("title");
let progress = document.getElementById("progress");
let time = document.getElementById("time");

function loadSong(index) {
  audio.src = songs[index].src;
  title.innerText = songs[index].title;
}

function togglePlay() {
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

function nextSong() {
  current = (current + 1) % songs.length;
  loadSong(current);
  audio.play();
}

function prevSong() {
  current = (current - 1 + songs.length) % songs.length;
  loadSong(current);
  audio.play();
}

audio.addEventListener("timeupdate", () => {
  let percent = (audio.currentTime / audio.duration) * 100;
  progress.style.width = percent + "%";

  let minutes = Math.floor(audio.currentTime / 60);
  let seconds = Math.floor(audio.currentTime % 60);
  if (seconds < 10) seconds = "0" + seconds;

  time.innerText = minutes + ":" + seconds;
});

function setProgress(e) {
  let width = e.currentTarget.clientWidth;
  let clickX = e.offsetX;
  let duration = audio.duration;

  audio.currentTime = (clickX / width) * duration;
}

loadSong(current);
</script>

</body>
</html>
