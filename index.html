<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>سایت میلاد</title>

  <style>
    body {
      margin: 0;
      font-family: Tahoma;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 100px;
    }

    h1 {
      font-size: 40px;
      color: #00ffd5;
    }

    p {
      font-size: 20px;
      margin-top: 20px;
    }

    button {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #00ffd5;
      color: black;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00bfa6;
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>سلام 👋</h1>
    <p>به سایت میلاد خوش اومدی 😎🔥</p>
    <p>این سایت با GitHub ساخته شده 🚀</p>

    <button onclick="alert('دمت گرم که اومدی 😍')">
      کلیک کن 😁
    </button>
  </div>

</body>
</html>
