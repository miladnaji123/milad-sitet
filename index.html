<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>تبدیل متن به صدا</title>

  <style>
    body {
      font-family: Tahoma;
      text-align: center;
      background: #0f172a;
      color: white;
      padding: 50px;
    }

    h1 {
      color: #38bdf8;
    }

    input {
      width: 80%;
      padding: 15px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      margin-top: 20px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

<h1>🔊 تبدیل متن به صدا</h1>

<input type="text" id="text" placeholder="متن رو اینجا بنویس">
<br>
<button onclick="speak()">پخش صدا</button>

<script>
function speak() {
  const text = document.getElementById("text").value;

  if (!text) {
    alert("یه متن بنویس 😅");
    return;
  }

  const speech = new SpeechSynthesisUtterance(text);

  function loadVoiceAndSpeak() {
    let voices = speechSynthesis.getVoices();

    let faVoice = voices.find(v => v.lang === "fa-IR");

    if (faVoice) {
      speech.voice = faVoice;
      speech.lang = "fa-IR";
    } else {
      let enVoice = voices.find(v => v.lang.includes("en"));
      speech.voice = enVoice;
      speech.lang = "en-US";
    }

    speech.rate = 0.9;
    speech.pitch = 1;

    speechSynthesis.cancel();
    speechSynthesis.speak(speech);
  }

  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadVoiceAndSpeak;
  } else {
    loadVoiceAndSpeak();
  }
}
</script>

</body>
</html>
