<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>Calm Zone 🌿</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Tahoma, sans-serif;
      background: linear-gradient(135deg, #87CEEB, #B0E0E6);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    #text {
      font-size: 20px;
      margin-top: 15px;
      min-height: 30px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #333;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #eee;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Calm Zone 🌿</h1>
    <p>یک جای امن برای آرامش تو 💙</p>

    <div id="text"></div>

    <button onclick="startTyping()">شروع آرامش ✨</button>
  </div>

  <script>
    const messages = [
      "همه چی درست میشه...",
      "نفس عمیق بکش...",
      "تو قوی‌تری از چیزی که فکر می‌کنی 💙",
      "آرامش همینجاست..."
    ];

    let i = 0;
    let j = 0;

    function startTyping() {
      document.getElementById("text").innerHTML = "";
      i = 0;
      j = 0;
      type();
    }

    function type() {
      if (i < messages.length) {
        if (j < messages[i].length) {
          document.getElementById("text").innerHTML += messages[i].charAt(j);
          j++;
          setTimeout(type, 50);
        } else {
          i++;
          j = 0;
          document.getElementById("text").innerHTML += "<br>";
          setTimeout(type, 800);
        }
      }
    }
  </script>

</body>
</html>
