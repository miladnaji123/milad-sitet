<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm Zone</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
}

header {
  text-align: center;
  padding: 50px 20px;
}

h1 {
  font-size: 48px;
}

p {
  opacity: 0.8;
}

.btn {
  background: #4CAF50;
  border: none;
  padding: 15px 25px;
  border-radius: 10px;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.section {
  padding: 40px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.persons {
  display: flex;
  gap: 15px;
  overflow-x: auto;
}

.person {
  min-width: 150px;
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.person img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
  <h1>🌿 Calm Zone</h1>
  <p>الهام بگیر، یاد بگیر، رشد کن</p>
  <button class="btn" onclick="start()">شروع سفر ✨</button>
</header>

<section class="section">
  <h2>دسته‌بندی‌ها</h2>
  <div class="cards">
    <div class="card">📚 زندگینامه</div>
    <div class="card">🎧 پادکست</div>
    <div class="card">🎥 ویدیو</div>
    <div class="card">📸 اینستاگرام</div>
  </div>
</section>

<section class="section">
  <h2>افراد معروف</h2>
  <div class="persons">
    <div class="person">
      <img src="https://upload.wikimedia.org/wikipedia/commons/d/d4/N.Tesla.JPG">
      <p>نیکولا تسلا</p>
    </div>
    <div class="person">
      <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Albert_Einstein_Head.jpg">
      <p>آلبرت انیشتین</p>
    </div>
    <div class="person">
      <img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/Steve_Jobs_Headshot_2010-CROP.jpg">
      <p>استیو جابز</p>
    </div>
    <div class="person">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/0d/Nelson_Mandela_1994.jpg">
      <p>نلسون ماندلا</p>
    </div>
  </div>
</section>

<script>
function start(){
  alert("به Calm Zone خوش آمدی 🌿");
}
</script>

</body>
</html>
