<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>تست صدا</title>
</head>
<body>

<h2>تست تبدیل متن به صدا</h2>

<input type="text" id="text" placeholder="متن رو بنویس">
<button onclick="speak()">پخش صدا</button>

<script>
function speak() {
  const text = document.getElementById("text").value;
  const speech = new SpeechSynthesisUtterance(text);

  function loadVoiceAndSpeak() {
    let voices = speechSynthesis.getVoices();
    let faVoice = voices.find(v => v.lang === "fa-IR");

    if (faVoice) {
      speech.voice = faVoice;
      speech.lang = "fa-IR";
    } else {
      let enVoice = voices.find(v => v.lang.includes("en"));
      speech.voice = enVoice;
      speech.lang = "en-US";
    }

    speech.rate = 0.9;
    speech.pitch = 1;

    speechSynthesis.cancel();
    speechSynthesis.speak(speech);
  }

  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadVoiceAndSpeak;
  } else {
    loadVoiceAndSpeak();
  }
}
</script>

</body>
</html>
