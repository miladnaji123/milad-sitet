<script>
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);

  function loadVoiceAndSpeak() {
    let voices = speechSynthesis.getVoices();

    let faVoice = voices.find(v => v.lang && v.lang.toLowerCase().includes("fa"));

    if (faVoice) {
      speech.voice = faVoice;
      speech.lang = "fa-IR";
    } else {
      let enVoice = voices.find(v => v.lang && v.lang.toLowerCase().includes("en"));
      if (enVoice) {
        speech.voice = enVoice;
        speech.lang = "en-US";
      }
    }

    speech.rate = 0.9;
    speech.pitch = 1;

    speechSynthesis.cancel();
    speechSynthesis.speak(speech);
  }

  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadVoiceAndSpeak;
  } else {
    loadVoiceAndSpeak();
  }
}

function speakText() {
  let text = document.getElementById("text").value;
  if (text.trim() !== "") {
    speak(text);
  } else {
    alert("یه متن بنویس");
  }
}
</script>
