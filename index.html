<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>آرامش ذهن</title>
</head>
<body style="text-align:center; font-family:tahoma; margin-top:50px;">

<h2 id="text">نفس عمیق بکش... همه چیز درست میشه 🌿</h2>

<button onclick="startRelax()">شروع آرامش</button>

<script>
function speak(text) {
    const speech = new SpeechSynthesisUtterance(text);

    function loadVoiceAndSpeak() {
        let voices = speechSynthesis.getVoices();
        let faVoice = voices.find(v => v.lang === "fa-IR");

        if (faVoice) {
            speech.voice = faVoice;
            speech.lang = "fa-IR";
        } else {
            let enVoice = voices.find(v => v.lang.includes("en"));
            speech.voice = enVoice;
            speech.lang = "en-US";
        }

        speech.rate = 0.9;
        speech.pitch = 1;

        speechSynthesis.cancel();
        speechSynthesis.speak(speech);
    }

    if (speechSynthesis.getVoices().length === 0) {
        speechSynthesis.onvoiceschanged = loadVoiceAndSpeak;
    } else {
        loadVoiceAndSpeak();
    }
}

function startRelax() {
    let message = "چشم‌هایت را ببند... نفس عمیق بکش... آرام باش... همه چیز درست می‌شود";

    document.getElementById("text").innerText = message;

    speak(message);
}
</script>

</body>
</html>
