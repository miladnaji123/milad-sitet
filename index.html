<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test</title>

  <style>
    body {
      background: black;
      color: #00ffcc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
      font-size: 30px;
    }
  </style>

</head>
<body>

<h1 id="text"></h1>

<script>
let txt = "Welcome to my site 😎🔥";
let i = 0;

function type() {
  if (i < txt.length) {
    document.getElementById("text").innerHTML += txt.charAt(i);
    i++;
    setTimeout(type, 100);
  }
}

window.onload = type;
</script>

</body>
</html>
