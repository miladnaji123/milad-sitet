<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>Calm Zone</title>
  <style>
    body {
      background: #111;
      color: #fff;
      text-align: center;
      font-family: sans-serif;
      padding-top: 100px;
    }
    button {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #00c896;
      color: white;
      cursor: pointer;
    }
    input {
      padding: 10px;
      width: 250px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>
<body>

<h1>Calm Zone 🌿</h1>

<input type="text" id="text" placeholder="متن فارسی بنویس">

<br><br>

<button onclick="speak()">شروع پخش 🔊</button>

<script>
function speak() {
  const text = document.getElementById("text").value;
  const speech = new SpeechSynthesisUtterance(text);

  function loadVoiceAndSpeak() {
    let voices = speechSynthesis.getVoices();

    // پیدا کردن هر صدای فارسی
    let faVoice = voices.find(v => v.lang.toLowerCase().includes("fa"));

    if (faVoice) {
      speech.voice = faVoice;
      speech.lang = faVoice.lang;
    } else {
      // اگر فارسی نبود، انگلیسی
      let enVoice = voices.find(v => v.lang.toLowerCase().includes("en"));
      speech.voice = enVoice;
      speech.lang = "en-US";
    }

    speech.rate = 0.9;
    speech.pitch = 1;

    speechSynthesis.cancel();
    speechSynthesis.speak(speech);
  }

  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = loadVoiceAndSpeak;
  } else {
    loadVoiceAndSpeak();
  }
}
</script>

</body>
</html>
