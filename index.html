<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calm Zone 🌿</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1b2a">

<style>
body {
  margin: 0;
  font-family: Tahoma;
  background: linear-gradient(135deg, #0d1b2a, #1b263b);
  color: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  font-size: 20px;
}

.container {
  background: rgba(255,255,255,0.05);
  padding: 35px;
  border-radius: 20px;
  backdrop-filter: blur(12px);
  max-width: 350px;
}

h1 {
  font-size: 38px;
  margin-bottom: 10px;
}

#text {
  margin-top: 20px;
  min-height: 40px;
  line-height: 1.8;
}

button {
  margin-top: 25px;
  padding: 14px 25px;
  border: none;
  border-radius: 12px;
  background: #ffffff;
  color: #0d1b2a;
  font-size: 18px;
  cursor: pointer;
}

/* دکمه دسترسی */
.accessibility {
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

<h1 aria-label="منطقه آرامش">Calm Zone 🌿</h1>

<p>جایی برای آرام شدن ذهن و قلب تو 💙</p>

<div id="text" aria-live="polite"></div>

<button onclick="startTyping()" aria-label="شروع آرامش">
شروع آرامش ✨
</button>

<button onclick="toggleFont()" class="accessibility">
بزرگ‌نمایی متن 🔍
</button>

</div>

<script>
const messages = [
"آرام باش... دنیا هنوز قشنگی‌های زیادی داره 💙",
"نفس عمیق بکش... تو امنی 🌿",
"هیچ چیزی برای همیشه سخت نمی‌مونه...",
"تو قوی‌تر از چیزی هستی که فکر می‌کنی ✨",
"همه چیز کم‌کم درست میشه..."
];

let i = 0;
let j = 0;

function startTyping() {
  document.getElementById("text").innerHTML = "";
  i = 0;
  j = 0;
  type();
}

function type() {
  if (i < messages.length) {
    if (j < messages[i].length) {
      document.getElementById("text").innerHTML += messages[i][j];
      j++;
      setTimeout(type, 50);
    } else {
      i++;
      j = 0;
      document.getElementById("text").innerHTML += "<br><br>";
      setTimeout(type, 800);
    }
  }
}

/* بزرگ کردن متن برای کم‌بینا */
let big = false;
function toggleFont() {
  if (!big) {
    document.body.style.fontSize = "26px";
    big = true;
  } else {
    document.body.style.fontSize = "20px";
    big = false;
  }
}

/* Service Worker */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
