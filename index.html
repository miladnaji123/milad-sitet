<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>صفحه من</title>

    <style>
        body {
            background: #222;
            color: white;
            text-align: center;
            font-family: Arial;
            margin-top: 100px;
        }

        h1 {
            font-size: 40px;
            animation: move 2s infinite alternate;
        }

        @keyframes move {
            from { transform: translateX(-40px); }
            to { transform: translateX(40px); }
        }

        #text {
            font-size: 22px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: orange;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>به سایت من خوش اومدی 😎</h1>

    <p id="text">یه سایت ساده ولی خفن 🔥</p>

    <button onclick="start()">شروع</button>

    <script>
        function start() {
            document.getElementById("text").innerText = "شروع شد 🚀";
        }
    </script>

</body>
</html>
