<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calm Zone</title>

  <style>
    body {
      background: #0d1b2a;
      color: white;
      text-align: center;
      padding: 50px;
      font-family: tahoma;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #1b263b;
      color: white;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: #415a77;
    }

    #text {
      margin-top: 30px;
      font-size: 20px;
      line-height: 2;
    }
  </style>
</head>

<body>

<h1>Calm Zone 🌿</h1>

<p id="text"></p>

<button onclick="startApp()">شروع آرامش ✨</button>

<script>
const messages = [
"آرام باش...",
"نفس عمیق بکش",
"همه چیز درست میشه",
"تو قوی‌تر از چیزی هستی که فکر می‌کنی 💪"
];

let i = 0;
let j = 0;

function startApp() {
  document.getElementById("text").innerHTML = "";
  i = 0;
  j = 0;
  type();
}

function type() {
  if (i < messages.length) {
    if (j < messages[i].length) {
      document.getElementById("text").innerHTML += messages[i][j];
      j++;
      setTimeout(type, 40);
    } else {
      speak(messages[i]);
      i++;
      j = 0;
      document.getElementById("text").innerHTML += "<br>";
      setTimeout(type, 1200);
    }
  }
}

function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);

  let voices = speechSynthesis.getVoices();
  let faVoice = voices.find(v => v.lang === "fa-IR");

  if (faVoice) {
    speech.voice = faVoice;
    speech.lang = "fa-IR";
  } else {
    speech.lang = "en-US";
  }

  speech.rate = 0.9;
  speech.pitch = 1;

  speechSynthesis.cancel();
  speechSynthesis.speak(speech);
}
</script>

</body>
</html>
