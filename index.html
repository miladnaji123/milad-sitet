<body>

<h1>Calm Zone 🌿</h1>

<input type="text" id="text" placeholder="متن بنویس...">

<br>

<button onclick="speak()">پخش صدا 🔊</button>

<div id="status"></div>

<script>
function speak() {
  const text = document.getElementById("text").value;
  const speech = new SpeechSynthesisUtterance(text);

  let voices = speechSynthesis.getVoices();
  let faVoice = voices.find(v => v.lang === "fa-IR");

  if (faVoice) {
    speech.voice = faVoice;
    speech.lang = "fa-IR";
  } else {
    speech.lang = "en-US";
  }

  speech.rate = 0.9;
  speech.pitch = 1;

  speechSynthesis.cancel();
  speechSynthesis.speak(speech);
}

// وضعیت اینترنت
function updateStatus() {
  const status = document.getElementById("status");
  if (navigator.onLine) {
    status.innerText = "🌐 آنلاین هستی";
  } else {
    status.innerText = "📴 آفلاین هستی (ولی اپ کار می‌کنه)";
  }
}
