<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milad Site</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  text-align: center;
  color: white;
  background: linear-gradient(135deg, #000, #111, #222);
}

.container {
  margin-top: 100px;
}

h1 {
  font-size: 30px;
}

.btn {
  display: block;
  width: 220px;
  margin: 15px auto;
  padding: 15px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  font-size: 18px;
  transition: 0.3s;
}

.whatsapp {
  background: #25D366;
}

.instagram {
  background: #E1306C;
}

.btn:hover {
  transform: scale(1.1);
}
</style>

</head>
<body>

<div class="container">
  <h1>به سایت میلاد خوش اومدی 😎🔥</h1>

  <!-- واتساپ هوشمند -->
  <a href="#" onclick="sendMessage()" class="btn whatsapp">
    📱 واتساپ
  </a>

  <!-- اینستاگرام -->
  <a href="https://instagram.com/najimilad_66" class="btn instagram">
    📸 اینستاگرام
  </a>
</div>

<!-- موزیک پس زمینه -->
<audio autoplay loop>
  <source src="https://dl.espressif.com/dl/audio/ff-16b-2c-44100hz.mp3" type="audio/mp3">
</audio>

<script>
function sendMessage() {
  let name = prompt("اسمت چیه؟ 😎");

  if (name != null && name != "") {
    let message = "سلام میلاد 👋 من " + name + " هستم، سایتتو دیدم خیلی خفن بود 🔥";
    let url = "https://wa.me/989014545513?text=" + encodeURIComponent(message);
    window.open(url, "_blank");
  }
}
</script>

</body>
</html>
