<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>صفحه من</title>

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            font-family: Arial;
            margin-top: 100px;
        }

        button {
            background-color: #ff9800;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            margin: 10px;
        }

        button:hover {
            background-color: #e68900;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <h1>به سایت من خوش اومدی 😎</h1>

    <p id="text">اینجا قراره کلی چیز خفن بسازیم 😎</p>

    <button onclick="start()">شروع 🚀</button>
    <button onclick="playMusic()">🎵 پخش موزیک</button>
    <button onclick="pauseMusic()">⏸ توقف موزیک</button>

    <!-- موزیک -->
    <audio id="music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        function start() {
            document.getElementById("text").innerText = "شروع کردیم 🚀🔥";
        }

        function playMusic() {
            document.getElementById("music").play();
        }

        function pauseMusic() {
            document.getElementById("music").pause();
        }
    </script>

</body>
</html>
