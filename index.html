<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calm Zone 🌿</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1b2a">

<style>
body {
  margin: 0;
  font-family: Tahoma;
  background: linear-gradient(135deg, #0d1b2a, #1b263b);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

/* کارت */
.container {
  background: rgba(255,255,255,0.05);
  padding: 35px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  max-width: 350px;
  box-shadow: 0 0 25px rgba(0,0,0,0.3);
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1;}
}

h1 {
  font-size: 34px;
}

/* متن */
#text {
  margin-top: 20px;
  min-height: 60px;
  line-height: 1.8;
  font-size: 20px;
}

/* دکمه‌ها */
button {
  margin-top: 15px;
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.start {
  background: #ffffff;
  color: #0d1b2a;
}

.stop {
  background: #ff4d4d;
  color: white;
}

button:hover {
  transform: scale(1.05);
}

/* قلب */
.heart {
  position: absolute;
  font-size: 20px;
  animation: float 4s linear infinite;
}

@keyframes float {
  from {transform: translateY(0);}
  to {transform: translateY(-100vh);}
}
</style>
</head>

<body>

<div class="container">
  <h1>Calm Zone 🌿</h1>
  <p>جایی برای آرامش تو 💙</p>

  <div id="text"></div>

  <button class="start" onclick="startApp()">شروع ✨</button>
  <button class="stop" onclick="stopApp()">توقف ⛔</button>
</div>

<script>
const messages = [
"آرام باش... دنیا هنوز قشنگه 💙",
"نفس عمیق بکش... همه چیز میگذره 🌿",
"تو قوی‌تر از چیزی هستی که فکر می‌کنی ✨",
"به خودت ایمان داشته باش 💫",
"همه چیز درست میشه 🌈"
];

let i = 0;
let j = 0;
let isRunning = false;

/* شروع */
function startApp() {
  document.getElementById("text").innerHTML = "";
  i = 0;
  j = 0;
  isRunning = true;
  type();
}

/* توقف */
function stopApp() {
  isRunning = false;
  speechSynthesis.cancel();
}

/* تایپ */
function type() {
  if (!isRunning) return;

  if (i < messages.length) {
    if (j < messages[i].length) {
      document.getElementById("text").innerHTML += messages[i][j];
      j++;
      setTimeout(type, 40);
    } else {
      speak(messages[i]);
      i++;
      j = 0;
      document.getElementById("text").innerHTML += "<br><br>";
      setTimeout(type, 1200);
    }
  }
}
