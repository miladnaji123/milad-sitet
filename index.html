<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm Zone 🌿</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Tahoma, sans-serif;
  background: linear-gradient(135deg, #87CEFA, #B0E0E6); /* آبی آسمونی */
  color: #03396c;
  text-align: center;
  overflow: hidden;
}

.container {
  position: relative;
  top: 40%;
  transform: translateY(-50%);
}

h1 {
  font-size: 50px;
  margin-bottom: 10px;
}

#text {
  font-size: 22px;
  margin-top: 20px;
  min-height: 30px;
}

a {
  display: inline-block;
  margin-top: 30px;
  padding: 10px 20px;
  background: white;
  color: #0077b6;
  border-radius: 20px;
  text-decoration: none;
  transition: 0.3s;
}

a:hover {
  background: #e0f7ff;
}

/* نور نرم آبی */
.glow {
  position: absolute;
  width: 300px;
  height: 300px;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  filter: blur(100px);
  animation: move 12s infinite alternate;
}

@keyframes move {
  from { transform: translate(-50px, -50px); }
  to { transform: translate(50px, 50px); }
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="container">
  <h1>🌿 Calm Zone</h1>
  <div id="text"></div>

  <a href="#">شروع آرامش ✨</a>
</div>

<script>
let texts = [
  "به منطقه آرامش خوش اومدی 🌿",
  "یه نفس عمیق بکش 😌",
  "همه چیز درست میشه ✨",
  "اینجا جای آرامشه 💙"
];

let i = 0;
let j = 0;
let currentText = "";
let isDeleting = false;

function type() {
  currentText = texts[i];

  if (!isDeleting) {
    document.getElementById("text").innerHTML = currentText.substring(0, j++);
    if (j > currentText.length) {
      isDeleting = true;
      setTimeout(type, 1500);
      return;
    }
  } else {
    document.getElementById("text").innerHTML = currentText.substring(0, j--);
    if (j < 0) {
      isDeleting = false;
      i = (i + 1) % texts.length;
    }
  }

  setTimeout(type, isDeleting ? 50 : 100);
}

type();
</script>

</body>
</html>
