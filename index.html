<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>سایت خفن من</title>

    <style>
        body {
            background: linear-gradient(45deg, #111, #333);
            color: white;
            text-align: center;
            font-family: sans-serif;
            overflow: hidden;
        }

        h1 {
            margin-top: 50px;
        }

        #text {
            font-size: 24px;
            margin-top: 30px;
            animation: moveText 2s infinite alternate;
        }

        @keyframes moveText {
            from {
                transform: translateX(-20px);
                color: yellow;
            }
            to {
                transform: translateX(20px);
                color: orange;
            }
        }

        button {
            margin-top: 30px;
            padding: 12px 25px;
            font-size: 18px;
            background: orange;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: red;
            transform: scale(1.1);
        }

        a {
            display: block;
            margin-top: 20px;
            color: cyan;
        }
    </style>

</head>

<body>

    <h1>🚀 به سایت خفن من خوش اومدی 😎</h1>

    <p id="text">اینجا قراره ترکونیم 🔥🔥</p>

    <button onclick="start()">شروع کنیم</button>

    <a href="about.html">برو صفحه دوم</a>

    <script>
        function start() {
            document.getElementById("text").innerText = "شروع شد 😈🔥";
        }
    </script>

</body>
</html>
