<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>Calm Zone</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: sans-serif;
      padding-top: 100px;
    }

    h1 {
      font-size: 40px;
    }

    p {
      color: #94a3b8;
    }

    button {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Calm Zone 🌿</h1>
<p>جایی برای آرامش تو 💙</p>

<button onclick="startCalm()">شروع آرامش ✨</button>

<script>
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);

  let voices = speechSynthesis.getVoices();
  let faVoice = voices.find(v => v.lang === "fa-IR");

  if (faVoice) {
    speech.voice = faVoice;
    speech.lang = "fa-IR";
  }

  speech.rate = 0.9;
  speech.pitch = 1;

  speechSynthesis.cancel();
  speechSynthesis.speak(speech);
}

function startCalm() {
  speak("چشمانت را ببند... نفس عمیق بکش... تو در آرامش هستی");
}
</script>

</body>
</html>
